      function MessageInput({GetMessage, setGetMessage}){

        function SendOrCancel(event){
          if (event.key === "Enter") {
            setGetMessage( event.target.value)
            // console.log(event);jh
          } else if (event.key === "Escape") {
            setGetMessage("")
          }
        }

        function getText(event){
          setGetMessage(event.target.value)
      
        }

        return (
          <>
          <input value={GetMessage} onChange={getText}  onKeyDown={SendOrCancel}/>
          <button>Submit</button>
          </>
        )
      }


      function Message({GetMessage}){

          </>
