<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
</head>
<body>
  

  <div class="lmao"></div>
    <script src="https://unpkg.com/supersimpledev/react.js"></script>
    <script src="https://unpkg.com/supersimpledev/react-dom.js"></script>
    <script src="https://unpkg.com/supersimpledev/dayjs.js"></script>
    <script src="https://unpkg.com/supersimpledev/babel.js"></script>


    <script type="text/babel">
      // const messageBtn = document.getElementById('root')
      // const result = ReactDOM.createRoot(messageBtn)
      const productCost = 10 + 8
      const shippingCost = 5
      const currentDate = dayjs().format('MMMM D')
      const currenttime = dayjs().format('HH:mm:ss')

      function cart(){
        return (<div>
        <button>Good Job!</button>
        <p>My name is Jade</p>

        <p>Cotton Socks</p>
        <p>Price: $10</p>

        <button>Add to Cart</button>

        <p>Product cost: ${productCost}</p>
        <p>Shipping cost: ${shippingCost}</p>
        <p>Total cost: ${productCost + shippingCost}</p>
        <p>Today is: {currentDate}</p>
        <p>Current time: {currenttime}</p>
        </div>);
      }
      
        const messageBtn = document.querySelector('.lmao')
        const result = ReactDOM.createRoot(messageBtn)
        
        const codeText =<p>Current time: {dayjs().format('HH:mm:ss')}</p>;
        result.render(codeText)
      setInterval(()=>{
        const codeText =<p>Current time: {dayjs().format('HH:mm:ss')}</p>;
        result.render(codeText)
      }, 1000);
    </script>



</body>
</html>
